<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>{{title}}</title>
<style>
@page { size: A4; margin: 2.2cm 2cm; }
body {
  font-family: "Source Han Serif SC", "Noto Serif CJK SC", "Cormorant Garamond", Georgia, serif;
  color: #2A2332;
  line-height: 1.7;
  max-width: 720px;
  margin: 48px auto;
  padding: 0 24px;
  background: #F7F2E9;
}
h1, h2, h3 {
  font-family: "Cormorant Garamond", Georgia, serif;
  color: #6B5876;
  font-weight: 500;
}
h1 { font-size: 2em; border-bottom: 1px solid #B8A4C9; padding-bottom: 0.2em; }
blockquote { border-left: 2px solid #95A89C; padding-left: 1em; color: #4E3F5A; font-style: italic; }
code { background: #EFE8DC; padding: 1px 5px; border-radius: 2px; font-family: "JetBrains Mono", Menlo, monospace; font-size: 0.9em; }
pre { background: #EFE8DC; border-left: 2px solid #B8A4C9; padding: 12px 16px; overflow-x: auto; }
pre code { background: none; padding: 0; }
table { border-collapse: collapse; width: 100%; margin: 1em 0; }
th { background: #6B5876; color: white; padding: 8px 10px; text-align: left; font-weight: 500; }
td { padding: 8px 10px; border-bottom: 1px solid rgba(149,168,156,0.4); }
tr:nth-child(even) td { background: rgba(247, 242, 233, 0.6); }
a { color: #6B5876; }
</style>
</head>
<body>
{{body}}
</body>
</html>
